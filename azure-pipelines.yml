trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  serviceConnection: 'Azure subscription 1 (90f790a2-2dbf-4bf8-82d1-7b22ed604795)'

stages:
- stage: Init
  displayName: Terraform Init
  jobs:
  - job: Init
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'environments/dev'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'sejalbackend2026'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'dev.tfstate'

- stage: Plan
  displayName: Terraform Plan
  dependsOn: Init
  jobs:
  - job: Plan
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'environments/dev'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'sejalbackend2026'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: 'environments/dev'
        commandOptions: '-var-file=dev.tfvars'
        environmentServiceNameAzureRM: $(serviceConnection)

- stage: Apply
  displayName: Terraform Apply
  dependsOn: Plan
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: Apply
    steps:
    - checkout: self

    - task: TerraformInstaller@1
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: 'environments/dev'
        backendServiceArm: $(serviceConnection)
        backendAzureRmResourceGroupName: 'demo-aks'
        backendAzureRmStorageAccountName: 'sejalbackend2026'
        backendAzureRmContainerName: 'demo'
        backendAzureRmKey: 'dev.tfstate'

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: 'environments/dev'
        commandOptions: '-var-file=dev.tfvars -auto-approve'
        environmentServiceNameAzureRM: $(serviceConnection)
